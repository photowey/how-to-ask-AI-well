name: Docs Pages

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - ".vitepress/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.meta.outputs.branch }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      artifact_path: ${{ steps.meta.outputs.artifact_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build metadata
        id: meta
        run: |
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "artifact_path=.vitepress/dist" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build documentation
        run: pnpm run docs:build

      - name: Verify Build Output
        run: |
          if [ ! -d "${{ steps.meta.outputs.artifact_path }}" ]; then
            echo "::error::Build output directory '${{ steps.meta.outputs.artifact_path }}' not found. Check VitePress config."
            exit 1
          fi
          ls -la "${{ steps.meta.outputs.artifact_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.meta.outputs.artifact_path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write workflow summary
        run: |
          {
            echo "## 📚 Docs Pages Deployment"
            echo
            echo "| Metric | Value |"
            echo "| :--- | :--- |"
            echo "| Branch | \`${{ needs.build.outputs.branch }}\` |"
            echo "| Commit | \`${{ needs.build.outputs.short_sha }}\` |"
            echo "| Status | ✅ Success |"
            echo "| URL | [Visit Site](https://photowey.github.io/${{ github.event.repository.name }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
